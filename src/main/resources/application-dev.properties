# Server Configuration
server.port=8080

# Spring MVC Configuration
spring.mvc.view.prefix=/templates/
spring.mvc.view.suffix=.html

# Database Configuration (Development)
spring.datasource.url=jdbc:mysql://localhost:3306/aliyun_demo
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Aliyun OSS Configuration (Development)
aliyun.oss.endpoint=https://oss-cn-hangzhou.aliyuncs.com
aliyun.oss.accessKeyId=your-dev-access-key-id
aliyun.oss.accessKeySecret=your-dev-access-key-secret
aliyun.oss.bucketName=your-dev-bucket-name

# Aliyun Deployment Configuration (Development)
aliyun.deployment.ecsHost=your-dev-ecs-host
aliyun.deployment.sshUsername=root
aliyun.deployment.sshPrivateKey=your-dev-private-key
aliyun.deployment.region=cn-hangzhou
