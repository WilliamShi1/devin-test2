# AWS Configuration
aws.region=${AWS_REGION:us-west-2}
aws.s3.bucket=${AWS_S3_BUCKET:your-bucket-name}

# AWS Credentials (prefer using IAM roles in production)
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_KEY:}

# Database Configuration for AWS
spring.datasource.url=${AWS_RDS_URL:jdbc:mysql://localhost:3306/aliyun_demo}
spring.datasource.username=${AWS_RDS_USERNAME:root}
spring.datasource.password=${AWS_RDS_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.aliyundemo=DEBUG
