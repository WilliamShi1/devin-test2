# Server Configuration
server.port=8080

# Spring MVC Configuration
spring.mvc.view.prefix=/templates/
spring.mvc.view.suffix=.html

# Database Configuration (Production)
spring.datasource.url=${ALIYUN_RDS_URL}
spring.datasource.username=${ALIYUN_RDS_USERNAME}
spring.datasource.password=${ALIYUN_RDS_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Aliyun OSS Configuration (Production)
aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT}
aliyun.oss.accessKeyId=${ALIYUN_ACCESS_KEY_ID}
aliyun.oss.accessKeySecret=${ALIYUN_ACCESS_KEY_SECRET}
aliyun.oss.bucketName=${ALIYUN_OSS_BUCKET_NAME}

# Aliyun Deployment Configuration (Production)
aliyun.deployment.ecsHost=${ALIYUN_ECS_HOST}
aliyun.deployment.sshUsername=${ALIYUN_SSH_USERNAME}
aliyun.deployment.sshPrivateKey=${ALIYUN_SSH_PRIVATE_KEY}
aliyun.deployment.region=${ALIYUN_REGION}
